set-window-option -g mode-keys vi
set -g focus-events on

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"

# DESIGN TWEAKS
# color theme: vague (matches ~/.config/ghostty/config)
#   bg #141415  bg-alt #252530  fg #cdcdcd  muted #606079
#   red #d8647e  green #7fa563  yellow #f3be7c
#   blue #6e94b2  magenta #bb9dbd  cyan #aeaed1

# truecolor, so the hex values above render as-is
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour '#6e94b2'

# copy mode
setw -g mode-style 'fg=#141415 bg=#f3be7c bold'

# panes
set -g pane-border-style 'fg=#252530'
set -g pane-active-border-style 'fg=#6e94b2'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#606079 bg=#141415'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=#cdcdcd bg=#252530'
set -g status-right ''
set -g status-right-length 50

setw -g window-status-current-style 'fg=#141415 bg=#6e94b2'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=#606079 bg=#141415'
setw -g window-status-format ' #I #[fg=#cdcdcd]#W #[fg=#bb9dbd]#F '

setw -g window-status-bell-style 'fg=#141415 bg=#f3be7c bold'

# messages
set -g message-style 'fg=#141415 bg=#f3be7c bold'
